name = "engram-mcp-server"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_URL = "https://getengram.app"

# Secrets (set via `wrangler secret put`):
#   SUPABASE_JWT_SECRET     — Supabase project JWT secret (HS256, from dashboard → Settings → API)
#   STRIPE_SECRET_KEY       — Stripe API key
#   STRIPE_WEBHOOK_SECRET   — Stripe webhook signing secret
#   STRIPE_PRICE_ID_PRO     — Stripe price ID for Pro plan
#   STRIPE_PRICE_ID_TEAM    — Stripe price ID for Team plan

[[d1_databases]]
binding = "DB"
database_name = "engram-db"
database_id = "fcf57f81-8d26-4288-aee5-11c42d6ca0d5"
migrations_dir = "../../packages/db/migrations"

[[vectorize]]
binding = "VECTORIZE"
index_name = "engram-vectors"

[ai]
binding = "AI"

# Custom domain — serves MCP at mcp.getengram.app
[[routes]]
pattern = "mcp.getengram.app/*"
zone_name = "getengram.app"
